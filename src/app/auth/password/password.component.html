<div class="wrapper">
  <h1>パスワード再発行</h1>

  <mat-card class="card">
    <div class="description">
      登録しているメールアドレスを入力してください。<br>
      パスワード再設定用のリンクをお送りします。
    </div>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>メールアドレス</mat-label>
      <input matInput type="email">
    </mat-form-field>

    <button mat-raised-button color="primary" class="reset">
      送信
    </button>

    <div class="link" routerLink="/auth/login">
      ログイン画面へ戻る
    </div>
  </mat-card>
</div>
